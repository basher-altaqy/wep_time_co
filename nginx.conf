# Saff edge — terminates inbound traffic on container :80, proxies
# to the Next.js app at saff-app:3002 over the saff-net Docker network.
# Mounted into nginx:alpine at /etc/nginx/conf.d/default.conf (read-only).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream saff_app {
    server saff-app:3002;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    # Limits & timeouts
    client_max_body_size 10M;
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Lightweight health check (doesn't touch the app)
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        proxy_pass http://saff_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / HTTP-upgrade passthrough (Supabase realtime, future features)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
